<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELCAN AI - Mobile Ready</title>
    <style>
        /* CSS RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            height: 100dvh; /* Dinamik hündürlük */
        }
        
        #chat-container { 
            width: 100%; 
            max-width: 600px; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            height: 100%; /* Ekranı tam tutur */
        }

        /* HEADER - Tətbiq havası vermək üçün */
        header {
            padding: 15px;
            background: #2c3e50;
            color: white;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        #messages { 
            flex-grow: 1; /* Qalan bütün boşluğu bura tutur */
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            background: #f9f9f9;
        }
        
        /* BOT MESAJI */
        .bot-msg { display: flex; align-items: flex-start; gap: 8px; animation: fadeIn 0.3s; }
        .bot-img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd; }
        .bot-content { max-width: 85%; }
        .bot-name { font-size: 10px; color: #888; margin-left: 2px; }
        .bot-text { background: #ffffff; padding: 10px 14px; border-radius: 4px 18px 18px 18px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        /* İSTİFADƏÇİ MESAJI */
        .user-msg { 
            align-self: flex-end; 
            background: #2c3e50; 
            color: white; 
            padding: 10px 14px; 
            border-radius: 18px 18px 4px 18px; 
            max-width: 85%; 
            font-size: 15px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* GİRİŞ SAHƏSİ */
        #input-area { 
            padding: 10px 15px; 
            display: flex; 
            align-items: center;
            gap: 10px;
            border-top: 1px solid #eee;
            background: white;
            padding-bottom: env(safe-area-inset-bottom, 15px); /* iPhone alt barı üçün */
        }
        
        input { 
            flex: 1; 
            border: 1px solid #e0e0e0; 
            border-radius: 20px; 
            padding: 12px 18px; 
            outline: none; 
            font-size: 16px; /* Mobil yaxınlaşmanın qarşısını alır */
            background: #f8f9fa;
        }
        
        button { 
            background: #2c3e50; 
            color: white; 
            border: none; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="chat-container">
    <header>ELCAN AI</header>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Mesaj yazın..." autocomplete="off">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // Qeyd: Bu JS hissəsində API_KEY yoxdur! 
    // Sən mütləq arxada Node.js serverini (server.js) işlətməlisən.
    async function sendMessage() {
        const input = document.getElementById("user-input");
        const msg = input.value.trim();
        if (!msg) return;

        const msgDiv = document.getElementById("messages");
        msgDiv.innerHTML += `<div class="user-msg">${msg}</div>`;
        input.value = "";
        msgDiv.scrollTop = msgDiv.scrollHeight;

        try {
            // Sənin serverinin linki (məsələn localhost və ya hosting linki)
            const response = await fetch("http://localhost:3000/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });

            const data = await response.json();
            
            msgDiv.innerHTML += `
                <div class="bot-msg">
                    <img src="https://i.ibb.co/Qv94MBvB/image.png" class="bot-img">
                    <div class="bot-content">
                        <span class="bot-name">ELCAN AI</span>
                        <div class="bot-text">${data.reply}</div>
                    </div>
                </div>`;
